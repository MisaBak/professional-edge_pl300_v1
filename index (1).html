<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PL-300 Practice Exam</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --accent: #1f6feb;
    --accent-hover: #388bfd;
    --correct: #238636;
    --correct-light: #2ea043;
    --incorrect: #b62324;
    --incorrect-light: #da3633;
    --warn: #9e6a03;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #6e7681;
    --radius: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ===== LANDING ===== */
  #landing {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .landing-header {
    text-align: center;
    margin-bottom: 48px;
  }

  .landing-header h1 {
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
    margin-bottom: 8px;
  }

  .landing-header h1 span {
    color: var(--accent-hover);
  }

  .landing-header p {
    color: var(--text-muted);
    font-size: 1rem;
  }

  .exam-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    width: 100%;
    max-width: 800px;
  }

  .exam-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .exam-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    transform: scaleX(0);
    transition: transform 0.2s ease;
  }

  .exam-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(31, 111, 235, 0.15);
  }

  .exam-card:hover::before { transform: scaleX(1); }

  .exam-card.disabled {
    opacity: 0.4;
    cursor: not-allowed;
    pointer-events: none;
  }

  .exam-card .exam-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 2rem;
    font-weight: 600;
    color: var(--accent-hover);
    display: block;
    margin-bottom: 8px;
  }

  .exam-card .exam-label {
    font-size: 0.85rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .exam-card .exam-count {
    font-size: 0.78rem;
    color: var(--text-dim);
    margin-top: 6px;
  }

  .exam-card .coming-soon {
    display: inline-block;
    margin-top: 8px;
    font-size: 0.7rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 2px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ===== EXAM ===== */
  #exam-view { display: none; min-height: 100vh; }

  .exam-topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: var(--radius);
    padding: 6px 12px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.82rem;
    transition: all 0.15s;
  }

  .back-btn:hover {
    border-color: var(--text-muted);
    color: var(--text);
  }

  .exam-title-bar {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text);
  }

  .progress-info {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.82rem;
    color: var(--text-muted);
  }

  .progress-bar-wrap {
    flex: 1;
    max-width: 300px;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  /* ===== QUESTION AREA ===== */
  .question-area {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .question-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .q-number {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    background: var(--accent);
    color: #fff;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .q-category {
    font-size: 0.78rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .q-multi-badge {
    font-size: 0.72rem;
    background: var(--warn);
    color: #fff;
    padding: 2px 8px;
    border-radius: 20px;
  }

  .question-text {
    font-size: 1.05rem;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 24px;
    line-height: 1.7;
  }

  .question-exhibit {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
    overflow-x: auto;
  }

  .question-exhibit table {
    border-collapse: collapse;
    width: 100%;
    font-size: 0.9rem;
  }

  .question-exhibit th {
    background: var(--surface2);
    color: var(--text-muted);
    text-align: left;
    padding: 8px 12px;
    border: 1px solid var(--border);
    font-weight: 600;
    font-size: 0.82rem;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .question-exhibit td {
    padding: 8px 12px;
    border: 1px solid var(--border);
    color: var(--text);
  }

  .question-exhibit tr:nth-child(even) td { background: var(--surface2); }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    width: 100%;
    font-family: inherit;
    color: var(--text);
    font-size: 0.95rem;
    line-height: 1.5;
  }

  .option-item:hover {
    border-color: var(--accent);
    background: rgba(31, 111, 235, 0.05);
  }

  .option-item.selected {
    border-color: var(--accent);
    background: rgba(31, 111, 235, 0.1);
  }

  .option-item.revealed-correct {
    border-color: var(--correct-light);
    background: rgba(35, 134, 54, 0.1);
  }

  .option-item.revealed-incorrect {
    border-color: var(--incorrect-light);
    background: rgba(182, 35, 36, 0.1);
  }

  .option-item.revealed-missed {
    border-color: var(--correct-light);
    background: rgba(35, 134, 54, 0.07);
    opacity: 0.8;
  }

  .option-marker {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
    margin-top: 1px;
    transition: all 0.15s;
    font-family: 'IBM Plex Mono', monospace;
  }

  .option-item.selected .option-marker {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .option-item.revealed-correct .option-marker {
    background: var(--correct);
    border-color: var(--correct-light);
    color: #fff;
  }

  .option-item.revealed-incorrect .option-marker {
    background: var(--incorrect);
    border-color: var(--incorrect-light);
    color: #fff;
  }

  .option-item.revealed-missed .option-marker {
    background: transparent;
    border-color: var(--correct-light);
    color: var(--correct-light);
  }

  .option-text { flex: 1; }

  /* ===== NAV BUTTONS ===== */
  .nav-buttons {
    justify-content: space-between;
    display: flex;
    gap: 12px;
    margin-top: 32px;
    align-items: center;
  }

  .btn {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    padding: 10px 22px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }

  .btn-primary:hover { background: var(--accent-hover); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { border-color: var(--text-muted); }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn-submit {
    background: #2ea043;
    color: #fff;
    white-space: nowrap;
  }

  .btn-submit:hover { background: #3fb950; }

  /* ===== TOPBAR SUBMIT ===== */
  .topbar-submit-btn {
    font-size: 0.8rem;
    padding: 7px 14px;
    flex-shrink: 0;
  }

  /* ===== MINI NAV ===== */
  .mini-nav {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
    justify-content: center;
  }

  .mini-dot {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 0.68rem;
    font-family: 'IBM Plex Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    line-height: 1;
  }

  .mini-dot:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .mini-dot-answered {
    background: rgba(31, 111, 235, 0.15);
    border-color: var(--accent);
    color: var(--accent-hover);
  }

  .mini-dot-current {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 700;
  }

  .mini-nav-ellipsis {
    color: var(--text-dim);
    font-size: 0.75rem;
    padding: 0 2px;
  }

  /* ===== RESULTS ===== */
  #results-view { display: none; min-height: 100vh; padding: 40px 24px; }

  .results-header {
    max-width: 860px;
    margin: 0 auto 40px;
    text-align: center;
  }

  .score-ring {
    width: 140px;
    height: 140px;
    margin: 0 auto 24px;
    position: relative;
  }

  .score-ring svg { transform: rotate(-90deg); }

  .score-ring-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .score-pct {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 2rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .score-label {
    font-size: 0.72rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  .results-title {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .results-subtitle {
    color: var(--text-muted);
    font-size: 0.95rem;
  }

  .results-stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin: 24px 0;
  }

  .stat-item { text-align: center; }

  .stat-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.6rem;
    font-weight: 700;
  }

  .stat-value.correct { color: var(--correct-light); }
  .stat-value.incorrect { color: var(--incorrect-light); }

  .stat-label {
    font-size: 0.78rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .review-section {
    max-width: 860px;
    margin: 0 auto;
  }

  .review-section h2 {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 0.85rem;
  }

  .review-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--incorrect-light);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }

  .review-card-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 12px;
  }

  .review-q-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    background: var(--incorrect);
    color: #fff;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .review-q-text {
    font-size: 0.93rem;
    color: var(--text);
    line-height: 1.5;
  }

  .review-answers {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin: 12px 0;
  }

  .review-answer-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 0.88rem;
    padding: 6px 10px;
    border-radius: 4px;
  }

  .review-answer-row.your-wrong {
    background: rgba(182, 35, 36, 0.1);
    border: 1px solid rgba(218, 54, 51, 0.3);
  }

  .review-answer-row.correct-ans {
    background: rgba(35, 134, 54, 0.1);
    border: 1px solid rgba(46, 160, 67, 0.3);
  }

  .review-answer-row .ans-label {
    font-size: 0.72rem;
    font-weight: 600;
    white-space: nowrap;
    margin-top: 1px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .review-answer-row.your-wrong .ans-label { color: var(--incorrect-light); }
  .review-answer-row.correct-ans .ans-label { color: var(--correct-light); }

  .review-explanation {
    margin-top: 12px;
    padding: 12px;
    background: var(--surface2);
    border-radius: 4px;
    font-size: 0.87rem;
    color: var(--text-muted);
    line-height: 1.6;
    border-left: 2px solid var(--accent);
  }

  .review-explanation strong {
    display: block;
    color: var(--text);
    margin-bottom: 4px;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .results-actions {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 32px 0;
  }

  /* ===== STATEMENT TABLE ===== */
  .stmt-table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 0.9rem;
  }

  .stmt-table th {
    background: var(--surface2);
    color: var(--text-muted);
    padding: 8px 14px;
    border: 1px solid var(--border);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    font-weight: 600;
  }

  .stmt-table td {
    padding: 10px 14px;
    border: 1px solid var(--border);
    color: var(--text);
    vertical-align: top;
  }

  .stmt-table tr:nth-child(even) td:first-child { background: rgba(255,255,255,0.02); }

  /* ===== CODE ===== */
  .code-block {
    font-family: 'IBM Plex Mono', monospace;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
    font-size: 0.82rem;
    color: #a5d6ff;
    overflow-x: auto;
    margin: 12px 0;
    white-space: pre-wrap;
    line-height: 1.5;
  }

  @media (max-width: 600px) {
    .landing-header h1 { font-size: 1.6rem; }
    .exam-grid { grid-template-columns: repeat(2, 1fr); }
    .results-stats { gap: 16px; }
    .topbar-left { gap: 8px; }
    .exam-title-bar { display: none; }
  }
</style>
</head>
<body>

<!-- ===== LANDING ===== -->
<div id="landing">
  <div class="landing-header">
    <h1>PL-300 <span>Practice Exams</span></h1>
    <p>Microsoft Power BI Data Analyst certification preparation</p>
  </div>
  <div class="exam-grid">
    <div class="exam-card" onclick="startExam(1)">
      <span class="exam-num">01</span>
      <div class="exam-label">Exam 1</div>
      <div class="exam-count">63 questions</div>
    </div>
    <div class="exam-card disabled">
      <span class="exam-num">02</span>
      <div class="exam-label">Exam 2</div>
      <span class="coming-soon">Coming soon</span>
    </div>
    <div class="exam-card disabled">
      <span class="exam-num">03</span>
      <div class="exam-label">Exam 3</div>
      <span class="coming-soon">Coming soon</span>
    </div>
    <div class="exam-card disabled">
      <span class="exam-num">04</span>
      <div class="exam-label">Exam 4</div>
      <span class="coming-soon">Coming soon</span>
    </div>
    <div class="exam-card disabled">
      <span class="exam-num">R</span>
      <div class="exam-label">Renewal Exam</div>
      <span class="coming-soon">Coming soon</span>
    </div>
  </div>
</div>

<!-- ===== EXAM VIEW ===== -->
<div id="exam-view">
  <div class="exam-topbar">
    <div class="topbar-left">
      <button class="back-btn" onclick="confirmExit()">&#8592; Exit</button>
      <div class="exam-title-bar" id="topbar-title">Exam 1</div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-info" id="progress-info">1 / 63</div>
    <button class="btn btn-submit topbar-submit-btn" id="topbar-submit" onclick="confirmSubmit()">Submit Answers</button>
  </div>
  <div class="question-area" id="question-area"></div>
</div>

<!-- ===== RESULTS VIEW ===== -->
<div id="results-view">
  <div class="results-header">
    <div class="score-ring">
      <svg width="140" height="140" viewBox="0 0 140 140">
        <circle cx="70" cy="70" r="58" fill="none" stroke="#21262d" stroke-width="10"/>
        <circle cx="70" cy="70" r="58" fill="none" stroke="#1f6feb" stroke-width="10"
          stroke-dasharray="364.4" id="score-arc" stroke-dashoffset="364.4"
          stroke-linecap="round"/>
      </svg>
      <div class="score-ring-text">
        <div class="score-pct" id="score-pct">0%</div>
        <div class="score-label">Score</div>
      </div>
    </div>
    <div class="results-title" id="results-title">Results</div>
    <div class="results-subtitle" id="results-subtitle"></div>
    <div class="results-stats">
      <div class="stat-item">
        <div class="stat-value correct" id="stat-correct">0</div>
        <div class="stat-label">Correct</div>
      </div>
      <div class="stat-item">
        <div class="stat-value incorrect" id="stat-incorrect">0</div>
        <div class="stat-label">Incorrect</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Total</div>
      </div>
    </div>
  </div>
  <div class="results-actions">
    <button class="btn btn-secondary" onclick="goHome()">Back to Home</button>
    <button class="btn btn-primary" onclick="retakeExam()">Retake Exam</button>
  </div>
  <div class="review-section" id="review-section"></div>
</div>

<script>
// ===== EXAM DATA =====
const EXAMS = {
  1: {
    title: "Exam 1",
    questions: [
      {
        id: 1,
        text: "You have some new staff joining your Power BI team. To help them get started in Power BI Desktop, you want to create a way for them to connect to the data sources that you are using on in your project. All they will need to do to connect to the data is enter their user credentials to authenticate. How can you achieve this?",
        type: "single",
        options: [
          "Create a dynamic M query",
          "Use an Excel Macro to build connections",
          "Create a PBIDS file with your key data sources",
          "Create a template in lineage view"
        ],
        correct: [2],
        explanation: "You can create a PBIDS file to streamline the experience for new or beginner report creators in your organization. If you create the PBIDS file from existing reports, it's easier for beginning report authors to build new reports from the same data. A dynamic M query does not assist in enabling data source connections. An Excel Macro cannot be used to create a template for a Power BI report. You cannot create a data template in the lineage view in Power BI Service."
      },
      {
        id: 2,
        text: "You use an R script to build a custom visual. However, you find that you cannot see data marked N/A and you are getting an error when importing your data as a list. What could be TWO reasons for these issues?",
        type: "multi",
        options: [
          "NA is transformed into NULL by Power BI",
          "You have not used the correct R version",
          "Power BI only supports R dataframes",
          "You need to first install the library tidyr"

        explanation: "By removing the Subject and Body columns during the import, you significantly reduce the amount of data stored in the Power BI model — this minimizes the model size and faster report performance. It also prevents report recipients from accessing the sensitive data since it is not stored in the model at all. Setting columns to Hidden in the Model view can make them invisible in reports, but the data is still stored in the model, leading to larger model sizes and potential security risks. RLS can restrict access to data but would be more complex to implement and might not be necessary if you can simply remove the sensitive columns during import."
      }
    ]
  }
};

// ===== STATE =====
let currentExam = null;
let currentQ = 0;
let userAnswers = {};   // { questionIndex: [selectedOptionIndices] }

// ===== UTILS =====
function $(id) { return document.getElementById(id); }
function show(id) { $(id).style.display = ''; }
function hide(id) { $(id).style.display = 'none'; }

// ===== NAVIGATION =====
function startExam(num) {
  currentExam = EXAMS[num];
  currentQ = 0;
  userAnswers = {};
  hide('landing');
  hide('results-view');
  $('exam-view').style.display = 'flex';
  $('exam-view').style.flexDirection = 'column';
  $('topbar-title').textContent = currentExam.title;
  renderQuestion();
  updateTopbarSubmit();
}

function goHome() {
  hide('exam-view');
  hide('results-view');
  show('landing');
}

function retakeExam() {
  const num = Object.keys(EXAMS).find(k => EXAMS[k] === currentExam);
  startExam(parseInt(num));
}

function confirmExit() {
  if (Object.keys(userAnswers).length > 0) {
    if (!confirm('Are you sure you want to exit? Your progress will be lost.')) return;
  }
  goHome();
}

// ===== QUESTION RENDERER =====
function renderQuestion() {
  const q = currentExam.questions[currentQ];
  const total = currentExam.questions.length;

  // Progress bar: based on answered questions
  const answeredCount = Object.keys(userAnswers).length;
  const pct = (answeredCount / total) * 100;
  $('progress-fill').style.width = pct + '%';
  $('progress-info').textContent = (currentQ + 1) + ' / ' + total;

  const ua = userAnswers[currentQ] || [];
  const isMulti = q.type === 'multi';
  const needed = isMulti ? q.correct.length : 1;

  let html = `
    <div class="question-meta">
      <span class="q-number">Q${q.id}</span>
      <span class="q-category">PL-300</span>
      ${isMulti ? `<span class="q-multi-badge">Select ${needed}</span>` : ''}
    </div>
    <div class="question-text">${formatText(q.text)}</div>
    <div class="options-list">
  `;

  q.options.forEach((opt, i) => {
    const isSelected = ua.includes(i);
    const cls = 'option-item' + (isSelected ? ' selected' : '');
    const marker = String.fromCharCode(65 + i);
    html += `
      <button class="${cls}" onclick="selectOption(${i})">
        <div class="option-marker">${marker}</div>
        <div class="option-text">${formatText(opt)}</div>
      </button>
    `;
  });

  html += `</div>`;

  // ── Navigation row ──
  html += `<div class="nav-buttons">`;

  // Left: Previous
  html += `<button class="btn btn-secondary" onclick="prevQ()" ${currentQ === 0 ? 'disabled' : ''}>&#8592; Previous</button>`;

  // Center: answered indicator dots (mini overview, max 10 shown around current)
  html += buildMiniNav(currentQ, total);

  // Right: Next or Submit
  if (currentQ < total - 1) {
    html += `<button class="btn btn-primary" onclick="nextQ()">Next &#8594;</button>`;
  } else {
    // On last question show Submit
    html += `<button class="btn btn-submit" onclick="confirmSubmit()">Submit Answers</button>`;
  }

  html += `</div>`;

  $('question-area').innerHTML = html;
  window.scrollTo(0, 0);
}

function buildMiniNav(current, total) {
  // Show up to 9 dot indicators centred around current question
  const MAX = 9;
  let start = Math.max(0, current - Math.floor(MAX / 2));
  let end = Math.min(total, start + MAX);
  if (end - start < MAX) start = Math.max(0, end - MAX);

  let dots = `<div class="mini-nav">`;
  if (start > 0) dots += `<span class="mini-nav-ellipsis">…</span>`;
  for (let i = start; i < end; i++) {
    const answered = userAnswers[i] && userAnswers[i].length > 0;
    const isCurrent = i === current;
    let cls = 'mini-dot';
    if (isCurrent) cls += ' mini-dot-current';
    else if (answered) cls += ' mini-dot-answered';
    dots += `<button class="${cls}" onclick="goToQ(${i})" title="Q${i+1}">${i + 1}</button>`;
  }
  if (end < total) dots += `<span class="mini-nav-ellipsis">…</span>`;
  dots += `</div>`;
  return dots;
}

function formatText(txt) {
  if (!txt) return '';
  return txt.replace(/\n/g, '<br>');
}

// ===== ANSWER SELECTION =====
function selectOption(idx) {
  const q = currentExam.questions[currentQ];
  if (!userAnswers[currentQ]) userAnswers[currentQ] = [];
  const ua = userAnswers[currentQ];

  if (q.type === 'single') {
    userAnswers[currentQ] = [idx];
  } else {
    const pos = ua.indexOf(idx);
    if (pos === -1) ua.push(idx);
    else ua.splice(pos, 1);
  }
  renderQuestion();
  updateTopbarSubmit();
}

// ===== NAVIGATION =====
function nextQ() {
  if (currentQ < currentExam.questions.length - 1) {
    currentQ++;
    renderQuestion();
  }
}

function prevQ() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
  }
}

function goToQ(idx) {
  currentQ = idx;
  renderQuestion();
}

// ===== TOPBAR SUBMIT BUTTON =====
function updateTopbarSubmit() {
  const btn = $('topbar-submit');
  if (!btn) return;
  const total = currentExam.questions.length;
  const answered = Object.keys(userAnswers).filter(k => userAnswers[k].length > 0).length;
  btn.textContent = `Submit Answers (${answered}/${total})`;
}

// ===== SUBMIT CONFIRMATION =====
function confirmSubmit() {
  const total = currentExam.questions.length;
  const answered = Object.keys(userAnswers).filter(k => userAnswers[k].length > 0).length;
  const unanswered = total - answered;

  if (unanswered > 0) {
    if (!confirm(`You have ${unanswered} unanswered question${unanswered > 1 ? 's' : ''}. Are you sure you want to submit?`)) return;
  } else {
    if (!confirm('Submit your exam? You will not be able to change your answers.')) return;
  }
  showResults();
}

// ===== RESULTS =====
function showResults() {
  const qs = currentExam.questions;
  let correct = 0;

  qs.forEach((q, idx) => {
    const ua = userAnswers[idx] || [];
    const ca = q.correct;
    const isCorrect = ua.length === ca.length && ca.every(c => ua.includes(c));
    if (isCorrect) correct++;
  });

  const total = qs.length;
  const incorrect = total - correct;
  const pct = Math.round((correct / total) * 100);

  hide('exam-view');
  $('results-view').style.display = 'block';

  $('score-pct').textContent = pct + '%';
  $('stat-correct').textContent = correct;
  $('stat-incorrect').textContent = incorrect;
  $('stat-total').textContent = total;

  const passThreshold = 70;
  const passed = pct >= passThreshold;
  $('results-title').textContent = passed ? 'Well done!' : 'Keep practicing';
  $('results-subtitle').textContent = passed
    ? `You passed with ${pct}%. The passing threshold is ${passThreshold}%.`
    : `You scored ${pct}%. The passing threshold is ${passThreshold}%. Review the questions below.`;

  // Animate ring
  const circumference = 364.4;
  const offset = circumference - (pct / 100) * circumference;
  $('score-arc').style.transition = 'stroke-dashoffset 1s ease';
  $('score-arc').style.stroke = passed ? '#2ea043' : '#da3633';
  setTimeout(() => { $('score-arc').style.strokeDashoffset = offset; }, 100);

  // Review — only wrong / unanswered
  let reviewHTML = '';
  const wrongQuestions = qs.filter((q, idx) => {
    const ua = userAnswers[idx] || [];
    return !(ua.length === q.correct.length && q.correct.every(c => ua.includes(c)));
  });

  if (wrongQuestions.length === 0) {
    reviewHTML = '<p style="color:var(--correct-light);text-align:center;padding:20px;font-size:1rem;">🎉 Perfect score! All answers correct.</p>';
  } else {
    reviewHTML = `<h2>Questions to Review (${wrongQuestions.length})</h2>`;
    wrongQuestions.forEach(q => {
      const idx = qs.indexOf(q);
      const ua = userAnswers[idx] || [];

      reviewHTML += `<div class="review-card">
        <div class="review-card-header">
          <span class="review-q-num">Q${q.id}</span>
          <div class="review-q-text">${formatText(q.text)}</div>
        </div>
        <div class="review-answers">`;

      if (ua.length > 0) {
        ua.forEach(i => {
          if (!q.correct.includes(i)) {
            reviewHTML += `<div class="review-answer-row your-wrong">
              <span class="ans-label">Your answer</span>
              <span>${q.options[i]}</span>
            </div>`;
          }
        });
      } else {
        reviewHTML += `<div class="review-answer-row your-wrong">
          <span class="ans-label">Your answer</span>
          <span><em>Not answered</em></span>
        </div>`;
      }

      q.correct.forEach(ci => {
        reviewHTML += `<div class="review-answer-row correct-ans">
          <span class="ans-label">Correct</span>
          <span>${q.options[ci]}</span>
        </div>`;
      });

      reviewHTML += `</div>
        <div class="review-explanation">
          <strong>Explanation</strong>
          ${q.explanation}
        </div>
      </div>`;
    });
  }

  $('review-section').innerHTML = reviewHTML;
  window.scrollTo(0, 0);
}

// Init
show('landing');
$('exam-view').style.display = 'none';
$('results-view').style.display = 'none';
</script>
</body>
</html>
